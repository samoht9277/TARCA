name = "tarca"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
# - TELEGRAM_BOT_TOKEN   → from @BotFather
# - AFIP_CERT            → PEM certificate from ARCA (ex-AFIP)
# - AFIP_KEY             → PEM private key
# - AFIP_CUIT            → your CUIT number (no dashes)
# - AFIP_PTO_VTA         → punto de venta number

[vars]
# Set to "production" when ready to issue real invoices
AFIP_ENV = "testing"
