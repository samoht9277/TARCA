name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx vitest run

      - name: Set secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          printf '%s' "${{ secrets.TELEGRAM_BOT_TOKEN }}" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          printf '%s' "${{ secrets.TELEGRAM_WEBHOOK_SECRET }}" | npx wrangler secret put TELEGRAM_WEBHOOK_SECRET
          printf '%s' "${{ secrets.SETUP_SECRET }}" | npx wrangler secret put SETUP_SECRET
          printf '%s' "${{ vars.ALLOWED_CHAT_IDS }}" | npx wrangler secret put ALLOWED_CHAT_IDS
          printf '%s' "${{ secrets.AFIP_CERT }}" | npx wrangler secret put AFIP_CERT
          printf '%s' "${{ secrets.AFIP_KEY }}" | npx wrangler secret put AFIP_KEY
          printf '%s' "${{ vars.AFIP_CUIT }}" | npx wrangler secret put AFIP_CUIT
          printf '%s' "${{ vars.AFIP_PTO_VTA }}" | npx wrangler secret put AFIP_PTO_VTA
          printf '%s' "${{ secrets.CALLBACK_SECRET }}" | npx wrangler secret put CALLBACK_SECRET

      - name: Deploy
        run: npx wrangler deploy --var AFIP_ENV:${{ vars.AFIP_ENV || 'testing' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Summary
        run: |
          echo "### Deployed to Cloudflare Workers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ vars.AFIP_ENV || 'testing' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pto Venta** | \`${{ vars.AFIP_PTO_VTA }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
