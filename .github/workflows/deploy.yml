name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx vitest run

      - name: Set secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          echo "${{ secrets.TELEGRAM_WEBHOOK_SECRET }}" | npx wrangler secret put TELEGRAM_WEBHOOK_SECRET
          echo "${{ secrets.SETUP_SECRET }}" | npx wrangler secret put SETUP_SECRET
          echo "${{ vars.ALLOWED_CHAT_IDS }}" | npx wrangler secret put ALLOWED_CHAT_IDS
          echo "${{ secrets.AFIP_CERT }}" | npx wrangler secret put AFIP_CERT
          echo "${{ secrets.AFIP_KEY }}" | npx wrangler secret put AFIP_KEY
          echo "${{ vars.AFIP_CUIT }}" | npx wrangler secret put AFIP_CUIT
          echo "${{ vars.AFIP_PTO_VTA }}" | npx wrangler secret put AFIP_PTO_VTA

      - name: Set AFIP_ENV override
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "${{ vars.AFIP_ENV || 'testing' }}" | npx wrangler secret put AFIP_ENV

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
